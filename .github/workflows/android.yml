name: Android CI Final Success

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unzip project (if exists)
        run: |
          if [ -f project.zip ]; then
            unzip -o project.zip
          fi

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper # Якщо wrapper немає, він спробує підібрати версію 8.0+

      - name: Build with Gradle
        run: |
          # Знаходимо папку з проектом
          PROJECT_ROOT=$(find . -name "build.gradle*" -exec dirname {} \; | head -n 1)
          cd $PROJECT_ROOT
          # Спробуємо зібрати через встановлений gradle
          gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: "**/build/outputs/apk/debug/*.apk"
