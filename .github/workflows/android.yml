name: Android CI Final Miracle

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unzip project
        run: |
          if [ -f project.zip ]; then
            unzip -o project.zip
          fi

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.2

      - name: Patch Missing Version Catalog
        run: |
          # Знаходимо папку проекту
          PROJECT_ROOT=$(find . -name "build.gradle*" -exec dirname {} \; | head -n 1)
          mkdir -p $PROJECT_ROOT/gradle
          
          # Створюємо файл, якого не вистачає
          cat <<EOF > $PROJECT_ROOT/gradle/libs.versions.toml
          [versions]
          agp = "8.2.0"
          kotlin = "1.9.0"
          
          [plugins]
          android-application = { id = "com.android.application", version.ref = "agp" }
          kotlin-android = { id = "org.jetbrains.kotlin.android", version.ref = "kotlin" }
          EOF

      - name: Final Build Attempt
        run: |
          PROJECT_ROOT=$(find . -name "build.gradle*" -exec dirname {} \; | head -n 1)
          cd $PROJECT_ROOT
          chmod +x gradlew || gradle wrapper
          ./gradlew assembleDebug --no-daemon
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: "**/build/outputs/apk/debug/*.apk"
