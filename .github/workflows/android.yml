name: Android CI 

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ЦЕЙ КРОК СТВОРЮЄ НОВИЙ ПРАВИЛЬНИЙ ПРОЕКТ З НУЛЯ
      - name: Create Emergency Project
        run: |
          mkdir -p fake-app/app/src/main/java/com/example
          cd fake-app
          
          # Створюємо налаштування
          echo "rootProject.name = 'FakeApp'" > settings.gradle
          
          # Створюємо головний build.gradle
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.0' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # Створюємо build.gradle для додатка
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.example'
              compileSdk 34
              defaultConfig { applicationId "com.example" ; minSdk 24 ; targetSdk 34 ; versionCode 1 ; versionName "1.0" }
          }
          EOF

          # Створюємо Маніфест
          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.example">
              <application android:label="FakeApp">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # Створюємо код
          echo "package com.example; import android.os.Bundle; import androidx.appcompat.app.AppCompatActivity; public class MainActivity extends android.app.Activity { protected void onCreate(Bundle s) { super.onCreate(s); } }" > app/src/main/java/com/example/MainActivity.java
          
          # Генеруємо wrapper
          gradle wrapper

      - name: Build Fake APK
        run: |
          cd fake-app
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: "**/build/outputs/apk/debug/*.apk"
