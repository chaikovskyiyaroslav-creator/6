name: Android CI Final Recovery

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unzip project (if exists)
        run: |
          if [ -f project.zip ]; then
            unzip -o project.zip
          fi

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Force Generate Gradle Wrapper
        run: |
          # Знаходимо папку, де лежить build.gradle
          PROJECT_ROOT=$(find . -name "build.gradle*" -exec dirname {} \; | head -n 1)
          cd $PROJECT_ROOT
          # Встановлюємо стандартний Gradle, щоб згенерувати локальний wrapper
          sudo apt-get install gradle -y
          gradle wrapper
          chmod +x gradlew

      - name: Build with Gradle
        run: |
          PROJECT_ROOT=$(find . -name "build.gradle*" -exec dirname {} \; | head -n 1)
          cd $PROJECT_ROOT
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: "**/build/outputs/apk/debug/*.apk"
