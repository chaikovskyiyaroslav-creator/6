name: Android CI Final Attempt

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unzip if zip exists
        run: |
          if [ -f project.zip ]; then
            unzip -o project.zip
          fi

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Fix Gradle Wrapper Path
        run: |
          # Ця команда знаходить, куди саме розпакувався файл .jar і копіює його туди, де його шукає система
          JAR_PATH=$(find . -name "gradle-wrapper.jar" | head -n 1)
          mkdir -p gradle/wrapper
          cp "$JAR_PATH" gradle/wrapper/gradle-wrapper.jar
          
          # Знаходимо gradlew і даємо йому права на запуск
          GRADLEW_FILE=$(find . -name "gradlew" | head -n 1)
          chmod +x "$GRADLEW_FILE"
          
          # Запам'ятовуємо шлях до папки з проектом
          echo "PROJECT_DIR=$(dirname "$GRADLEW_FILE")" >> $GITHUB_ENV

      - name: Build with Gradle
        run: |
          cd ${{ env.PROJECT_DIR }}
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: "**/build/outputs/apk/debug/*.apk"
