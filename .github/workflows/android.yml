name: Android CI - Chaikovskyi 
on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 1. Розпакування вашого файлу
    - name: Unzip project
      run: |
        unzip MyApplication.zip -d temp_folder
        # Переміщуємо вміст у корінь, щоб gradlew був на своєму місці
        mv temp_folder/* . || true
        mv temp_folder/.* . || true

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 2. Даємо права на запуск Gradle
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 3. Збірка APK (як вимагає завдання)
    - name: Build with Gradle
      run: ./gradlew assembleDebug

    # 4. Завантаження результату
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug.apk
        path: app/build/outputs/apk/debug/app-debug.apk
